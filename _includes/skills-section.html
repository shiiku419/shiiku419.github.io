{% if site.data.settings.skills %}
<!-- skills -->
<section class="section">
  <div class="container">
    <div class="row">
      <div class="col-lg-12 text-center">
        <h2 class="section-title">{{ site.data.settings.skills-title }}</h2>
      </div>
      {% for skill in site.data.settings.skills %}
      <div class="col-lg-2 col-sm-6 mb-4 mb-lg-0">
        <div class="position-relative rounded-top progress-wrapper">
          <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/{{skill.tag}}">
        </div>
      </div>
      {% endfor %}
    </div>
  </div>
</section>
<!-- /skills -->
{% endif %}
